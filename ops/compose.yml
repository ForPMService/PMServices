name: pmservices

services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: Release
    environment:
      ASPNETCORE_ENVIRONMENT: Development

      # DB (приложение) — оставил оба ключа, чтобы не зависеть от того,
      # как ты назовёшь строку подключения в коде (DefaultConnection vs AppDb)
      ConnectionStrings__DefaultConnection: Host=postgres-app;Port=5432;Database=pmservices;Username=pmservices;Password=${APP_DB_PASSWORD}
      ConnectionStrings__AppDb:             Host=postgres-app;Port=5432;Database=pmservices;Username=pmservices;Password=${APP_DB_PASSWORD}

      # Keycloak (это НЕ “особый синтаксис”, а обычная привязка конфигурации .NET:
      # Keycloak__Realm => Keycloak:Realm)
      Keycloak__Realm: ${KEYCLOAK_REALM}
      Keycloak__InternalAuthority: ${KEYCLOAK_INTERNAL_URL}/realms/${KEYCLOAK_REALM}
      Keycloak__PublicIssuer: ${KEYCLOAK_PUBLIC_URL}/realms/${KEYCLOAK_REALM}
      Keycloak__ClientId: ${KEYCLOAK_CLIENT_ID}
      Keycloak__ClientSecret: ${KEYCLOAK_CLIENT_SECRET}
      Keycloak__RequireHttpsMetadata: "false"

      # Redis
      Redis__ConnectionString: redis:6379

      # SMTP (Mailpit) — тут всегда 1025 внутри сети docker
      Smtp__Host: mailpit
      Smtp__Port: 1025

    ports:
      - "${API_HTTP_PORT}:8080"
    depends_on:
      postgres-app:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
      mailpit:
        condition: service_started
    networks: [pmnet]
    restart: unless-stopped

  postgres-app:
    image: postgres:16
    environment:
      POSTGRES_DB: pmservices
      POSTGRES_USER: pmservices
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
    ports:
      - "${APP_DB_PORT}:5432"
    volumes:
      - pg_app:/var/lib/postgresql/data
      # если у тебя реально есть ops/initdb/10-app.sql — включай:
      # - ./initdb/10-app.sql:/docker-entrypoint-initdb.d/10-app.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmservices -d pmservices"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [pmnet]
    restart: unless-stopped

  postgres-keycloak:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    ports:
      - "${KC_DB_PORT}:5432"
    volumes:
      - pg_keycloak:/var/lib/postgresql/data
      # если у тебя реально есть ops/initdb/20-keycloak.sql — включай:
      # - ./initdb/20-keycloak.sql:/docker-entrypoint-initdb.d/20-keycloak.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [pmnet]
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.7
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}

      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"

      # На будущее против "issuer invalid":
      # фиксируем внешний URL (frontend), а backchannel можно сделать динамическим
      #KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL}
      #KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"

    ports:
      - "${KEYCLOAK_HTTP_PORT}:8080"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    networks: [pmnet]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [pmnet]
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:v1.28.0
    ports:
      - "${MAILPIT_WEB_PORT}:8025"
      - "${MAILPIT_SMTP_PORT}:1025"
    networks: [pmnet]
    restart: unless-stopped

  # ----------------------------
  # Observability (ELK) — профиль
  # Запуск: docker compose --profile observability up -d
  # ----------------------------
  elasticsearch:
    profiles: ["observability"]
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.9
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks: [pmnet]
    restart: unless-stopped

  kibana:
    profiles: ["observability"]
    image: docker.elastic.co/kibana/kibana:8.19.9
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on: [elasticsearch]
    networks: [pmnet]
    restart: unless-stopped

networks:
  pmnet:
    driver: bridge

volumes:
  pg_app:
  pg_keycloak:
  redis_data:
  es_data:
