# ═══════════════════════════════════════════════════════════════
# OTel Collector config (contrib distribution 0.121)
#
# Схема потока:
#
#  .NET apps (bff, iam-api)                        Prometheus
#     │ OTLP gRPC :4317                                ↑ scrape :8889
#     ▼                                                │
#  [receivers.otlp]                          [exporters.prometheus]
#     │                                                │
#     ▼                                                │
#  [processors.batch + attributes/env]  ───────────────┘
#     │
#     ├─ traces  → [exporters.elasticsearch] → ES otel-traces-*
#     ├─ metrics → [exporters.prometheus]    → scrape:8889
#     └─ logs    → [exporters.elasticsearch] → ES otel-logs-*
#
# ═══════════════════════════════════════════════════════════════

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

  # Scrape Keycloak metrics — KC_METRICS_ENABLED=true (уже в compose.iam.yml)
  # otel-collector сам ходит в Keycloak и forward-ит метрики в pipeline
  prometheus/keycloak:
    config:
      scrape_configs:
        - job_name: keycloak
          scrape_interval: 30s
          static_configs:
            - targets: ["keycloak:8080"]
          metrics_path: /metrics

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # Добавляем deployment.environment ко всем данным
  attributes/env:
    actions:
      - key: deployment.environment
        value: dev
        action: upsert

  # Фильтруем health-check спаны — не засоряем трейсы
  filter/health:
    traces:
      span:
        - 'attributes["http.route"] == "/health"'
        - 'attributes["http.route"] == "/health/ready"'
        - 'attributes["http.route"] == "/metrics"'

exporters:
  # Логи + трейсы → Elasticsearch
  elasticsearch:
    endpoints: ["http://elasticsearch:9200"]
    logs_index:   "otel-logs"
    traces_index: "otel-traces"
    sending_queue:
      enabled: true
      num_consumers: 2
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s

  # Метрики → Prometheus scrape endpoint (Prometheus тянет сам)
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "pm"
    resource_to_telemetry_conversion:
      enabled: true  # добавляет service.name, deployment.environment как label

  # Debug в stdout OTel Collector (уровень basic — только счётчики)
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"
  pprof:
    endpoint: "0.0.0.0:1777"

service:
  extensions: [health_check, pprof]
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [filter/health, attributes/env, batch]
      exporters:  [elasticsearch, debug]

    metrics:
      receivers:  [otlp, prometheus/keycloak]
      processors: [attributes/env, batch]
      exporters:  [prometheus, debug]

    logs:
      receivers:  [otlp]
      processors: [attributes/env, batch]
      exporters:  [elasticsearch, debug]
