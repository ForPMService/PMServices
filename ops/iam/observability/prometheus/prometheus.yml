# ═══════════════════════════════════════════════════════════════
# Prometheus scrape config
#
# Архитектура:
#   .NET apps → OTLP → OTel Collector → prometheus exporter :8889
#   Prometheus scrapes: OTel Collector (метрики от bff + iam-api + keycloak)
#
# НЕ scrape напрямую bff/iam-api — они пушат через OTLP в коллектор.
# Keycloak метрики: OTel Collector сам их scrape-ит (prometheus/keycloak receiver)
# ═══════════════════════════════════════════════════════════════

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: dev

scrape_configs:

  # ── OTel Collector: метрики от всех .NET сервисов ────────────
  # Коллектор агрегирует bff + iam-api + keycloak через свои receivers.
  # Один scrape вместо трёх — проще и стабильнее.
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
    # labels для удобства фильтрации в Grafana
    metric_relabel_configs:
      - source_labels: [service_name]
        target_label: service

  # ── OTel Collector: самонаблюдение ───────────────────────────
  # Метрики самого коллектора (очереди, дропы, latency)
  - job_name: "otel-collector-internal"
    static_configs:
      - targets: ["otel-collector:8888"]
