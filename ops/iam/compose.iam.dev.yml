# ═══════════════════════════════════════════════════════════════
# Dev overlay — ТОЛЬКО для локальной разработки
# Публикует порты БД, Redis, Mailpit для отладки из IDE/инструментов
# В prod-подобном запуске: docker compose -f compose.iam.yml (без этого файла)
# ═══════════════════════════════════════════════════════════════

services:

  # В dev: монтируем nginx конфиг с хоста — можно менять без пересборки образа.
  # В prod (base compose): конфиг берётся из образа (COPY в Dockerfile).
  edge:
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/snippets/security_headers.conf:/etc/nginx/snippets/security_headers.conf:ro

  # Публикуем порты для локального доступа из IDE / DBeaver / redis-cli
  postgres-iam:
    ports:
      - "127.0.0.1:${IAM_PG_PORT}:5432"  # только localhost, не 0.0.0.0

  postgres-kc:
    ports:
      - "127.0.0.1:${KC_PG_PORT}:5432"

  redis:
    ports:
      - "127.0.0.1:${REDIS_PORT}:6379"

  mailpit:
    ports:
      - "127.0.0.1:${MAILPIT_WEB_PORT}:8025"
      - "127.0.0.1:${MAILPIT_SMTP_PORT}:1025"

