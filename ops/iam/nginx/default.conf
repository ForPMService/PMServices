# log_format для honeypot — должен быть в http{} контексте
log_format honeypot '$remote_addr [$time_local] '
                    '"$request" $status '
                    '"$http_user_agent"';

# ═══════════════════════════════════════════════════════════════
# Edge (Nginx) — ЕДИНСТВЕННАЯ публичная точка входа
# Keycloak НЕ публикует порты. Доступ только через этот конфиг.
# Принцип: deny by default, whitelist explicit.
# ═══════════════════════════════════════════════════════════════

# ── Rate limiting ────────────────────────────────────────────────────────────
# kc_auth: login/logout/registration — 5 попыток в минуту с одного IP
# kc_action: action-links из писем (verify, reset) — 20 в минуту
# bff_api: все /auth/* и /api/* — 200 в минуту (защита от скрейпинга)
# invite: /invite endpoint — 10 в минуту (отдельная зона)
limit_req_zone $binary_remote_addr zone=kc_auth:10m   rate=5r/m;
limit_req_zone $binary_remote_addr zone=kc_action:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=bff_api:10m   rate=200r/m;
limit_req_zone $binary_remote_addr zone=invite:10m    rate=10r/m;

# RFC 6585: rate limit exceeded → 429 Too Many Requests, не 503
limit_req_status 429;

# ── Cache для статики Keycloak (/resources/*) ────────────────────────────────
# levels=1:2 — двухуровневая директория (производительность на большом кеше)
# keys_zone=kc_res:10m — 10MB для хранения ключей (держит ~80k ключей)
# max_size=256m — максимум 256MB на диске
# inactive=7d — очищать если не запрашивалось 7 дней
# use_temp_path=off — писать сразу в кеш (избегаем лишних копирований)
proxy_cache_path /var/cache/nginx/kc
                 levels=1:2
                 keys_zone=kc_res:10m
                 max_size=256m
                 inactive=7d
                 use_temp_path=off;

# ── CSP: разные политики для KC (login) и BFF (SPA) ─────────────────────────
# KC login страница использует inline-скрипты и form-action на /realms/...
# SPA (через BFF) — строгий CSP с trusted-types
map $uri $csp_header {
    # KC страницы логина — разрешаем inline (KC требует) и form-action на себя
    ~^/realms/
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; frame-ancestors 'none'; form-action 'self';";
    # Всё остальное (SPA через BFF) — строгий CSP
    default
        "default-src 'self'; script-src 'self' 'strict-dynamic'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; require-trusted-types-for 'script'; trusted-types angular;";
}
# TODO (prod): 'unsafe-inline' в script-src заменить на 'nonce-{RANDOM}' — генерирует BFF.
# TODO (prod): HSTS включить после подтверждения TLS (см. ADR-022):
#   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# ── Proxy timeouts (явные, не надеяться на defaults nginx = 60s) ─────────────
proxy_connect_timeout  5s;   # TCP handshake к upstream
proxy_send_timeout    30s;   # отправка запроса к upstream
proxy_read_timeout    30s;   # ожидание ответа от upstream
# KC при холодном старте может отвечать медленно — для KC-endpoints увеличим
# через proxy_read_timeout override в location-блоках ниже

server {
    listen 80;
    server_name localhost;
    server_tokens off;  # не раскрывать версию nginx в заголовках

    # ── Docker DNS: откладываем резолв upstream до момента запроса ──────────
    # Без этого nginx упадёт при старте если keycloak или bff не запущен.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $kc_upstream  http://keycloak:8080;
    set $bff_upstream http://bff:8080;

    # ── Global security headers ──────────────────────────────────────────────
    # ВАЖНО: add_header НЕ наследуется если в location есть свой add_header.
    # Общий набор вынесен в snippets/security_headers.conf и подключается include.
    # В location без кастомных add_header — это include избыточен, но работает корректно.
    include /etc/nginx/snippets/security_headers.conf;

    # ── Proxy headers → upstream ─────────────────────────────────────────────
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host   $host;

    client_max_body_size 2m;

    # Edge self healthcheck — не зависит от BFF/KC
    location = /__edge/healthz {
        access_log off;
        include /etc/nginx/snippets/security_headers.conf;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ════════════════════════════════════════════════════════════════════
    # ЗАПРЕТЫ — жёсткие инварианты, порядок важен (обрабатываются первыми)
    # ════════════════════════════════════════════════════════════════════

    # KC Admin Console — никогда наружу
    location /admin/ {
        return 403;
    }

    # KC Metrics endpoint
    location = /metrics {
        return 403;
    }

    # Master realm — закрыт полностью (только служебный)
    location ^~ /realms/master/ {
        return 403;
    }

    # Token endpoint — только server-to-server (BFF → KC внутри сети, не через nginx)
    location ~ ^/realms/pmplatform/protocol/openid-connect/token$ {
        return 403;
    }

    # Userinfo — только server-to-server
    location ~ ^/realms/pmplatform/protocol/openid-connect/userinfo$ {
        return 403;
    }

    # JWKS / Certs — только server-to-server (BFF валидирует токены напрямую к KC)
    location ~ ^/realms/pmplatform/protocol/openid-connect/certs$ {
        return 403;
    }

    # Token Introspection — только server-to-server
    location ~ ^/realms/pmplatform/protocol/openid-connect/token/introspect$ {
        return 403;
    }

    # OIDC Discovery — браузеру не нужен (BFF ходит к KC напрямую)
    location ~ ^/realms/pmplatform/\.well-known/ {
        return 403;
    }

    # Закрываем все остальные realms — только pmplatform разрешён (whitelist ниже)
    # Любой другой /realms/<что-угодно>/ → 403
    location ~ ^/realms/(?!pmplatform/) {
        return 403;
    }

    # ════════════════════════════════════════════════════════════════════
    # HONEYPOT — логируем сканеров и автоматику
    # ════════════════════════════════════════════════════════════════════

    # Известные "fingerprint" пути KC/admin/популярных атак
    location ~ ^/(kc|realms/(?!pmplatform/)[^/]+|wp-admin|wp-login\.php|phpmyadmin|\.env|\.git|actuator|api/v1/pods) {
        access_log /var/log/nginx/honeypot.log honeypot;
        limit_req  zone=kc_auth burst=3 nodelay;
        return 403;
    }

    # ════════════════════════════════════════════════════════════════════
    # ROOT health-check Edge
    # ════════════════════════════════════════════════════════════════════
    location = / {
        include /etc/nginx/snippets/security_headers.conf;
        add_header Content-Type text/plain;
        return 200 "edge ok\n";
    }

    # ════════════════════════════════════════════════════════════════════
    # WHITELIST Keycloak (WBS 1.2.4–1.2.9)
    # Только pmplatform realm, только нужные endpoints
    # ════════════════════════════════════════════════════════════════════

    # OIDC Authorization Code — вход на страницу логина KC
    location ~ ^/realms/pmplatform/protocol/openid-connect/auth$ {
        limit_req  zone=kc_auth burst=5 nodelay;
        proxy_read_timeout 60s;  # KC login page может рендериться дольше
        proxy_pass $kc_upstream;
    }

    # OIDC Logout
    location ~ ^/realms/pmplatform/protocol/openid-connect/logout$ {
        limit_req  zone=kc_auth burst=5 nodelay;
        proxy_pass $kc_upstream;
    }

    # Registration (invite flow — KC UI)
    location ~ ^/realms/pmplatform/protocol/openid-connect/registrations$ {
        limit_req  zone=kc_auth burst=5 nodelay;
        proxy_pass $kc_upstream;
    }

    # Action links: verify-email, reset-password, execute-actions, etc.
    # Phase 1: этот блок закрывается когда BFF реализует /auth/action endpoint
    location ~ ^/realms/pmplatform/login-actions/ {
        limit_req  zone=kc_action burst=10 nodelay;
        proxy_read_timeout 60s;
        proxy_pass $kc_upstream;
    }

    # Статика KC темы (CSS, JS, шрифты, изображения)
    # Агрессивный кеш: KC не меняет статику между запросами одной версии
    location ~ ^/resources/ {
        proxy_cache            kc_res;
        proxy_cache_valid      200 301 302  7d;
        proxy_cache_valid      404          1m;
        proxy_cache_valid      any          0;   # всё остальное не кешируем
        proxy_cache_lock       on;               # thundering herd: один запрос к upstream при cache miss
        proxy_cache_lock_timeout 5s;
        proxy_cache_revalidate on;               # If-None-Match / If-Modified-Since при истечении
        proxy_cache_use_stale  error timeout updating http_500 http_502 http_503 http_504;
        add_header             X-Cache-Status $upstream_cache_status always;
        include                /etc/nginx/snippets/security_headers.conf;
        proxy_pass             $kc_upstream;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Phase 1: раскомментировать когда BFF реализует /auth/action
    # Тогда же закрыть блок /realms/pmplatform/login-actions/ выше (return 403)
    #
    # location = /auth/action {
    #     limit_req zone=kc_action burst=10 nodelay;
    #     proxy_pass $bff_upstream;
    # }
    #
    # Phase 1+: обфускация путей KC (только после интеграционных тестов!)
    # Важно: proxy_cookie_path переписывает Path= в Set-Cookie от KC,
    # иначе KC cookies не будут отправляться браузером на /s/* пути → login loop.
    #
    # location ^~ /s/ {
    #     rewrite ^/s/(.*)$ /realms/pmplatform/$1 break;
    #     proxy_pass        http://keycloak:8080;
    #     proxy_cookie_path /realms/pmplatform /s;
    # }
    # ─────────────────────────────────────────────────────────────────────────

    # ════════════════════════════════════════════════════════════════════
    # BFF — единственная публичная точка для API и SPA
    # ════════════════════════════════════════════════════════════════════

    # Invite link (токен из письма → BFF проверяет → redirect на KC registration)
    location /invite {
        limit_req  zone=invite burst=5 nodelay;
        proxy_pass $bff_upstream;
    }

    # Auth callbacks и session management
    location /auth/ {
        limit_req  zone=bff_api burst=20 nodelay;
        proxy_pass $bff_upstream;
    }

    # API endpoints
    location /api/ {
        limit_req  zone=bff_api burst=50 nodelay;
        proxy_pass $bff_upstream;
    }

    # Health check BFF (без rate limit — нужен для orchestration)
    location = /health {
        proxy_pass $bff_upstream/health;
    }

    # SPA assets и всё остальное → BFF
    location / {
        limit_req  zone=bff_api burst=100 nodelay;
        proxy_pass $bff_upstream;
    }
}