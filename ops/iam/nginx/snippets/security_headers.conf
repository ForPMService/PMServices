# ops/iam/nginx/snippets/security_headers.conf
#
# Единый набор security headers для Edge.
#
# ПОЧЕМУ ОТДЕЛЬНЫЙ ФАЙЛ:
# Nginx НЕ наследует add_header из родительского блока если в location
# есть хотя бы ОДИН свой add_header. Это официально задокументированное
# поведение (не баг). Источник:
#   https://nginx.org/en/docs/http/ngx_http_headers_module.html#add_header
#   "There could be several add_header directives. These directives are
#    inherited from the previous configuration level if and only if there
#    are no add_header directives defined on the current level."
#
# Решение: include этот файл в КАЖДЫЙ location, где нужен custom add_header.
# Тогда inheritance не нужен — каждый location явно подключает общий набор.
#
# CSP: $csp_header — map-переменная из default.conf (разные политики для KC и BFF).

add_header X-Frame-Options         "DENY"                               always;
add_header X-Content-Type-Options  "nosniff"                            always;
add_header Referrer-Policy         "strict-origin-when-cross-origin"    always;
add_header Permissions-Policy      "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header Content-Security-Policy $csp_header                          always;
add_header X-XSS-Protection        "1; mode=block"                      always;
