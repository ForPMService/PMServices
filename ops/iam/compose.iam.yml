services:

  # ─────────────────────────────────────────────────────────────────────────
  # Edge — единственный публичный порт (:8090 → :80)
  # Собирается из Dockerfile (не shell-хак в command)
  # ─────────────────────────────────────────────────────────────────────────
  edge:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "${EDGE_HTTP_PORT}:80"
    volumes:
      # nginx_cache: переживает рестарт контейнера, не зависит от хоста
      # default.conf и snippets/: в dev монтируются через overlay (compose.iam.dev.yml)
      # В prod-подобном запуске конфиг берётся из образа (COPY в Dockerfile)
      - nginx_cache:/var/cache/nginx/kc
    networks:
      - frontend
      - backend
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/__edge/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # BFF — Backend-For-Frontend
  # Управляет сессиями, OIDC flow, проксирует API
  # Добавляется через overlay (compose.iam.dev.yml) когда готов Dockerfile
  # ─────────────────────────────────────────────────────────────────────────

  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL IAM — хранит пользователей, роли, организации
  # ─────────────────────────────────────────────────────────────────────────
  postgres-iam:
    image: ${POSTGRES_IMAGE}
    # entrypoint: chmod +x перед запуском — нужен т.к. Windows git не сохраняет execute bit.
    # docker-entrypoint.sh запускает .sh файлы из initdb.d только если они исполняемые.
    entrypoint: ["/bin/sh", "-c", "chmod +x /docker-entrypoint-initdb.d/*.sh && exec docker-entrypoint.sh postgres"]
    environment:
      POSTGRES_DB:       ${IAM_PG_DB}
      POSTGRES_USER:     ${IAM_PG_USER}
      POSTGRES_PASSWORD: ${IAM_PG_PASSWORD}
      # Читаются initdb/00-roles.sh для создания ролей приложения
      IAM_APP_DB_USER:       ${IAM_APP_DB_USER}
      IAM_APP_DB_PASSWORD:   ${IAM_APP_DB_PASSWORD}
      IAM_MIGRATOR_DB_USER:  ${IAM_MIGRATOR_DB_USER}
      IAM_MIGRATOR_DB_PASSWORD: ${IAM_MIGRATOR_DB_PASSWORD}
    volumes:
      - iam_pgdata:/var/lib/postgresql
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${IAM_PG_USER} -d ${IAM_PG_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - db
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL KC — отдельный инстанс для Keycloak (изоляция данных, ADR-002)
  # ─────────────────────────────────────────────────────────────────────────
  postgres-kc:
    image: ${POSTGRES_IMAGE}
    environment:
      POSTGRES_DB:       ${KC_PG_DB}
      POSTGRES_USER:     ${KC_PG_USER}
      POSTGRES_PASSWORD: ${KC_PG_PASSWORD}
    volumes:
      - kc_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_PG_USER} -d ${KC_PG_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - db
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # Redis — BFF сессии, PKCE state, Streams для событий
  # RDB: snapshot каждые 60s если есть хотя бы 1 изменение
  # AOF: fsync каждую секунду — максимум 1 секунда потери данных при сбое
  # Оба механизма вместе = надёжная персистентность без потери производительности
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: ${REDIS_IMAGE}
    command: [
      "redis-server",
      "--requirepass",       "${REDIS_PASSWORD}",
      "--save",              "60 1",
      "--appendonly",        "yes",
      "--appendfsync",       "everysec",
      "--maxmemory",         "256mb",
      "--maxmemory-policy",  "noeviction"
      # noeviction: при нехватке памяти Redis вернёт ошибку — явная ошибка лучше тихой потери сессий.
      # allkeys-lru опасен: может выселить сессии без TTL при нехватке памяти.
      # Если нужен LRU для кеша — выносить кеш в отдельный Redis-инстанс.
    ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 320M
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # Mailpit — локальный SMTP + Web UI для тестирования email flows
  # ─────────────────────────────────────────────────────────────────────────
  mailpit:
    image: ${MAILPIT_IMAGE}
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 64M
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # Keycloak — IdP, OIDC Authorization Server
  # НЕТ published ports — доступен только через nginx whitelist
  # ─────────────────────────────────────────────────────────────────────────
  keycloak:
    image: ${KEYCLOAK_IMAGE}
    command: [
      "start-dev",
      "--import-realm",
      "--http-port=8080",
      "--hostname-strict=false"
    ]
    environment:
      KEYCLOAK_ADMIN:          ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      KC_DB:          postgres
      KC_DB_URL:      "jdbc:postgresql://postgres-kc:5432/${KC_PG_DB}"
      KC_DB_USERNAME: ${KC_PG_USER}
      KC_DB_PASSWORD: ${KC_PG_PASSWORD}

      # KC_HOSTNAME = публичный адрес Edge (используется в email-ссылках и редиректах)
      KC_HOSTNAME:       ${KC_HOSTNAME}
      KC_PROXY_HEADERS:  xforwarded
      KC_HTTP_ENABLED:   "true"

      KC_HEALTH_ENABLED:  "true"
      KC_METRICS_ENABLED: "true"

      KC_MAIL_HOST: mailpit
      KC_MAIL_PORT: "1025"
      KC_MAIL_FROM: ${KC_MAIL_FROM}
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres-kc:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - backend
      - db
    # КРИТИЧНО: нет секции ports — KC не торчит наружу (ADR-002)
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/9000 && printf \"GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q UP'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
    restart: unless-stopped

networks:
  frontend:   # edge ↔ внешний мир
  backend:    # edge ↔ bff, bff ↔ redis/mailpit/keycloak
  db:         # postgres-iam ↔ iam-api, postgres-kc ↔ keycloak

volumes:
  iam_pgdata:   # данные IAM PostgreSQL
  kc_pgdata:    # данные KC PostgreSQL
  nginx_cache:  # кеш статики KC (переживает рестарт edge)
  redis_data:   # RDB + AOF персистентность сессий
