// TODO: after TASK-007 smoke validation, evaluate replacing UuidValue with plain string for request id fields.
syntax = "proto3";
option csharp_namespace = "PM.IAM.Contracts";
package pm.iam.contracts.iam;
import "common.proto";

service PermissionService {
  rpc Check (CheckPermissionRequest) returns (CheckPermissionResponse);
}

message CheckPermissionRequest {
  .pm.platform.contracts.common.UUid7 request_user_id = 1;
  .pm.platform.contracts.common.UUid7 organization_id = 2;
  string permission = 3;
  optional string resource_id = 4;

}
message CheckPermissionResponse {
  bool has_permission = 1;
  string reason = 2;
}